# ==============================================================================
# TELEGRAF CONFIGURATION FOR OPC UA TELEMETRY COLLECTION
# Project: Material Handling Micro Cell (MHMC-01)
# Author: Lead Automation Engineer (MIT Graduate)
# ==============================================================================

[global_tags]
  cell_id = "mhmc_01"

[agent]
  interval = "100ms"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "500ms"
  flush_jitter = "50ms"
  precision = "ns"
  hostname = "scada_collector_node"
  omit_hostname = false

# ==============================================================================
# OUTPUT PLUGINS - INFLUXDB V2
# ==============================================================================
[[outputs.influxdb_v2]]
  urls = ["http://localhost:8086"]
  token = "AntigravityOpcUaToInfluxdbTelemetryToken2026=="
  organization = "AntigravityAutomation"
  bucket = "mhmc_telemetry"

# ==============================================================================
# INPUT PLUGINS - OPC UA
# ==============================================================================
[[inputs.opcua]]
  name = "mhmc_opcua"
  # OPC UA server endpoint
  endpoint = "opc.tcp://localhost:4840/freeopcua/server/"
  
  # Security configuration (None for simulation)
  security_policy = "None"
  security_mode = "None"
  
  # Connection timeouts
  connect_timeout = "5s"
  request_timeout = "5s"

  # ----------------------------------------------------
  # Conveyor Group Telemetry
  # ----------------------------------------------------
  [[inputs.opcua.group]]
    name = "conveyor_telemetry"
    namespace = "2"
    identifier_type = "s"
    tags = { "device_type" = "conveyor" }
    
    nodes = [
      { name = "speed_setpoint", identifier = "DeviceSet.Conveyor_1.SpeedSetpoint" },
      { name = "speed_feedback", identifier = "DeviceSet.Conveyor_1.SpeedFeedback" },
      { name = "is_running", identifier = "DeviceSet.Conveyor_1.IsRunning" },
      { name = "pe1_blocked", identifier = "DeviceSet.Conveyor_1.PE1_Blocked" },
      { name = "pe2_blocked", identifier = "DeviceSet.Conveyor_1.PE2_Blocked" },
      { name = "pe3_blocked", identifier = "DeviceSet.Conveyor_1.PE3_Blocked" },
      { name = "motor_current", identifier = "DeviceSet.Conveyor_1.VFD_Current" },
      { name = "faulted", identifier = "DeviceSet.Conveyor_1.Faulted" }
    ]

  # ----------------------------------------------------
  # Diverter Group Telemetry
  # ----------------------------------------------------
  [[inputs.opcua.group]]
    name = "diverter_1_telemetry"
    namespace = "2"
    identifier_type = "s"
    tags = { "diverter_id" = "diverter_1" }
    
    nodes = [
      { name = "is_home", identifier = "DeviceSet.Diverter_1.Home" },
      { name = "is_work", identifier = "DeviceSet.Diverter_1.Work" },
      { name = "command_extend", identifier = "DeviceSet.Diverter_1.CommandExtend" },
      { name = "pe_verify", identifier = "DeviceSet.Diverter_1.PE_Verify" },
      { name = "faulted", identifier = "DeviceSet.Diverter_1.Faulted" }
    ]

  [[inputs.opcua.group]]
    name = "diverter_2_telemetry"
    namespace = "2"
    identifier_type = "s"
    tags = { "diverter_id" = "diverter_2" }
    
    nodes = [
      { name = "is_home", identifier = "DeviceSet.Diverter_2.Home" },
      { name = "is_work", identifier = "DeviceSet.Diverter_2.Work" },
      { name = "command_extend", identifier = "DeviceSet.Diverter_2.CommandExtend" },
      { name = "pe_verify", identifier = "DeviceSet.Diverter_2.PE_Verify" },
      { name = "faulted", identifier = "DeviceSet.Diverter_2.Faulted" }
    ]

  # ----------------------------------------------------
  # Cell State & KPIs Group Telemetry
  # ----------------------------------------------------
  [[inputs.opcua.group]]
    name = "cell_kpis"
    namespace = "2"
    identifier_type = "s"
    tags = { "device_type" = "cell_controller" }
    
    nodes = [
      { name = "packml_mode", identifier = "ControlState.CurrentMode" },
      { name = "packml_state", identifier = "ControlState.CurrentState" },
      { name = "permissives_ok", identifier = "ControlState.PermissivesOK" },
      { name = "heartbeat", identifier = "ControlState.Heartbeat" },
      { name = "throughput_total", identifier = "KPIs.ThroughputTotal" },
      { name = "throughput_lane_a", identifier = "KPIs.ThroughputLaneA" },
      { name = "throughput_lane_b", identifier = "KPIs.ThroughputLaneB" },
      { name = "throughput_reject", identifier = "KPIs.ThroughputReject" },
      { name = "total_jams", identifier = "KPIs.TotalJams" },
      { name = "oee", identifier = "KPIs.OEE" }
    ]
