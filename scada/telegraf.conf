# ==============================================================================
# TELEGRAF CONFIGURATION FOR OPC UA TELEMETRY COLLECTION
# Project: Material Handling Micro Cell (MHMC-01)
# Author: Lead Automation Engineer (MIT Graduate)
# ==============================================================================

[global_tags]
  cell_id = "mhmc_01"

[agent]
  interval = "100ms"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "500ms"
  flush_jitter = "50ms"
  precision = "ns"
  hostname = "scada_collector_node"
  omit_hostname = false

# ==============================================================================
# OUTPUT PLUGINS - INFLUXDB V2
# ==============================================================================
[[outputs.influxdb_v2]]
  urls = ["http://localhost:8086"]
  token = "AntigravityOpcUaToInfluxdbTelemetryToken2026=="
  organization = "AntigravityAutomation"
  bucket = "mhmc_telemetry"

# ==============================================================================
# INPUT PLUGINS - OPC UA
# ==============================================================================
[[inputs.opcua]]
  name = "mhmc_opcua"
  # OPC UA server endpoint
  endpoint = "opc.tcp://localhost:4840/mhmc/server/"
  
  # Production security profile. Generate and trust client/server certs before use.
  security_policy = "Basic256Sha256"
  security_mode = "SignAndEncrypt"
  # certificate = "C:\\ProgramData\\Telegraf\\opcua\\telegraf-client.der"
  # private_key = "C:\\ProgramData\\Telegraf\\opcua\\telegraf-client-key.pem"
  
  # Connection timeouts
  connect_timeout = "5s"
  request_timeout = "5s"

  # ----------------------------------------------------
  # Conveyor Group Telemetry
  # ----------------------------------------------------
  [[inputs.opcua.group]]
    name = "conveyor_telemetry"
    namespace = "2"
    identifier_type = "s"
    tags = { "device_type" = "conveyor" }
    
    nodes = [
      { name = "speed_setpoint", identifier = "DeviceSet.Conveyor_1.SpeedSetpoint" },
      { name = "speed_feedback", identifier = "DeviceSet.Conveyor_1.SpeedFeedback" },
      { name = "is_running", identifier = "DeviceSet.Conveyor_1.IsRunning" },
      { name = "pe1_blocked", identifier = "DeviceSet.Conveyor_1.PE1_Blocked" },
      { name = "pe2_blocked", identifier = "DeviceSet.Conveyor_1.PE2_Blocked" },
      { name = "pe3_blocked", identifier = "DeviceSet.Conveyor_1.PE3_Blocked" },
      { name = "motor_current", identifier = "DeviceSet.Conveyor_1.VFD_Current" },
      { name = "faulted", identifier = "DeviceSet.Conveyor_1.Faulted" }
    ]

  # ----------------------------------------------------
  # Diverter Group Telemetry
  # ----------------------------------------------------
  [[inputs.opcua.group]]
    name = "diverter_1_telemetry"
    namespace = "2"
    identifier_type = "s"
    tags = { "diverter_id" = "diverter_1" }
    
    nodes = [
      { name = "is_home", identifier = "DeviceSet.Diverter_1.Home" },
      { name = "is_work", identifier = "DeviceSet.Diverter_1.Work" },
      { name = "command_extend", identifier = "DeviceSet.Diverter_1.CommandExtend" },
      { name = "pe_verify", identifier = "DeviceSet.Diverter_1.PE_Verify" },
      { name = "faulted", identifier = "DeviceSet.Diverter_1.Faulted" }
    ]

  [[inputs.opcua.group]]
    name = "diverter_2_telemetry"
    namespace = "2"
    identifier_type = "s"
    tags = { "diverter_id" = "diverter_2" }
    
    nodes = [
      { name = "is_home", identifier = "DeviceSet.Diverter_2.Home" },
      { name = "is_work", identifier = "DeviceSet.Diverter_2.Work" },
      { name = "command_extend", identifier = "DeviceSet.Diverter_2.CommandExtend" },
      { name = "pe_verify", identifier = "DeviceSet.Diverter_2.PE_Verify" },
      { name = "faulted", identifier = "DeviceSet.Diverter_2.Faulted" }
    ]

  [[inputs.opcua.group]]
    name = "scanner_telemetry"
    namespace = "2"
    identifier_type = "s"
    tags = { "device_type" = "scanner" }

    nodes = [
      { name = "last_barcode", identifier = "DeviceSet.Scanner_1.LastReadBarcode" },
      { name = "manual_trigger", identifier = "DeviceSet.Scanner_1.Trigger" },
      { name = "read_success", identifier = "DeviceSet.Scanner_1.ReadSuccess" }
    ]

  # ----------------------------------------------------
  # Cell State & KPIs Group Telemetry
  # ----------------------------------------------------
  [[inputs.opcua.group]]
    name = "cell_kpis"
    namespace = "2"
    identifier_type = "s"
    tags = { "device_type" = "cell_controller" }
    
    nodes = [
      { name = "packml_mode", identifier = "ControlState.CurrentMode" },
      { name = "packml_state", identifier = "ControlState.CurrentState" },
      { name = "permissives_ok", identifier = "ControlState.PermissivesOK" },
      { name = "heartbeat", identifier = "ControlState.Heartbeat" },
      { name = "throughput_total", identifier = "KPIs.ThroughputTotal" },
      { name = "throughput_lane_a", identifier = "KPIs.ThroughputLaneA" },
      { name = "throughput_lane_b", identifier = "KPIs.ThroughputLaneB" },
      { name = "throughput_reject", identifier = "KPIs.ThroughputReject" },
      { name = "total_jams", identifier = "KPIs.TotalJams" },
      { name = "availability", identifier = "KPIs.Availability" },
      { name = "performance", identifier = "KPIs.Performance" },
      { name = "quality", identifier = "KPIs.Quality" },
      { name = "oee", identifier = "KPIs.OEE" }
    ]

  # ----------------------------------------------------
  # Alarm and Event Timeline Telemetry
  # ----------------------------------------------------
  [[inputs.opcua.group]]
    name = "alarms_events"
    namespace = "2"
    identifier_type = "s"
    tags = { "device_type" = "alarm_manager" }

    nodes = [
      { name = "any_active", identifier = "Alarms.AnyActive" },
      { name = "any_unacked", identifier = "Alarms.AnyUnacked" },
      { name = "active_code", identifier = "Alarms.ActiveCode" },
      { name = "severity", identifier = "Alarms.Severity" },
      { name = "active_message", identifier = "Alarms.ActiveMessage" },
      { name = "general_jam_alarm", identifier = "Alarms.GeneralJamAlarm" },
      { name = "diverter_1_fault", identifier = "Alarms.Diverter1Fault" },
      { name = "diverter_2_fault", identifier = "Alarms.Diverter2Fault" },
      { name = "estop_tripped", identifier = "Alarms.EStopTripped" }
    ]

  [[inputs.opcua.group]]
    name = "event_timeline"
    namespace = "2"
    identifier_type = "s"
    tags = { "device_type" = "event_timeline" }

    nodes = [
      { name = "new_event", identifier = "EventTimeline.NewEvent" },
      { name = "last_sequence", identifier = "EventTimeline.LastSequence" },
      { name = "last_class", identifier = "EventTimeline.LastClass" },
      { name = "last_message", identifier = "EventTimeline.LastMessage" },
      { name = "last_severity", identifier = "EventTimeline.LastSeverity" }
    ]

  # ----------------------------------------------------
  # Maintenance and Collector Health
  # ----------------------------------------------------
  [[inputs.opcua.group]]
    name = "maintenance"
    namespace = "2"
    identifier_type = "s"
    tags = { "device_type" = "maintenance" }

    nodes = [
      { name = "manual_jog_forward", identifier = "Maintenance.ManualJogForward" },
      { name = "manual_jog_speed", identifier = "Maintenance.ManualJogSpeed" },
      { name = "maintenance_key", identifier = "Maintenance.MaintenanceKey" },
      { name = "reset_counters", identifier = "Maintenance.ResetCounters" },
      { name = "collector_heartbeat", identifier = "PLCIntegration.CollectorHeartbeat" },
      { name = "historian_healthy", identifier = "PLCIntegration.HistorianHealthy" },
      { name = "subscribe_enable", identifier = "PLCIntegration.SubscribeEnable" }
    ]

  [[inputs.opcua.group]]
    name = "recipes"
    namespace = "2"
    identifier_type = "s"
    tags = { "device_type" = "recipe_manager" }

    nodes = [
      { name = "active_recipe_id", identifier = "Recipes.ActiveRecipeID" },
      { name = "active_recipe_name", identifier = "Recipes.ActiveRecipeName" },
      { name = "target_speed", identifier = "Recipes.TargetSpeed" }
    ]
