apiVersion: 1

groups:
  - orgId: 1
    name: MHMC Historian Alerts
    folder: Material Handling Micro Cell
    interval: 1m
    rules:
      - uid: mhmc_low_throughput
        title: MHMC throughput below threshold
        condition: C
        for: 5m
        noDataState: NoData
        execErrState: Error
        annotations:
          summary: MHMC throughput has stayed below the configured threshold.
          description: Throughput per minute is below 5 for at least 5 minutes.
        labels:
          cell_id: mhmc_01
          severity: warning
        data:
          - refId: A
            datasourceUid: influxdb_flux
            relativeTimeRange:
              from: 600
              to: 0
            model:
              query: |
                from(bucket: "${MHMC_INFLUX_BUCKET}")
                  |> range(start: -10m)
                  |> filter(fn: (r) => r["_measurement"] == "computed_kpis")
                  |> filter(fn: (r) => r["_field"] == "throughput_per_min")
                  |> aggregateWindow(every: 1m, fn: mean, createEmpty: false)
                  |> last()
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [5]
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    type: last
                  type: query

      - uid: mhmc_jam_escalation
        title: MHMC jam count increased
        condition: C
        for: 2m
        noDataState: NoData
        execErrState: Error
        annotations:
          summary: MHMC jam count is increasing.
          description: Jam delta is greater than zero over the last 10 minutes.
        labels:
          cell_id: mhmc_01
          severity: critical
        data:
          - refId: A
            datasourceUid: influxdb_flux
            relativeTimeRange:
              from: 600
              to: 0
            model:
              query: |
                from(bucket: "${MHMC_INFLUX_BUCKET}")
                  |> range(start: -10m)
                  |> filter(fn: (r) => r["_measurement"] == "computed_kpis")
                  |> filter(fn: (r) => r["_field"] == "jam_delta")
                  |> aggregateWindow(every: 1m, fn: max, createEmpty: false)
                  |> last()
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    type: last
                  type: query
